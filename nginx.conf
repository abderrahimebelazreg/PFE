# /etc/nginx/sites-available/smart-library
#
# Setup:
#   sudo ln -s /etc/nginx/sites-available/smart-library /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;          # ← replace with your domain or IP

    # Redirect HTTP → HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    # ── Proxy to Gunicorn ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }

    # ── Serve static frontend files ───────────────────────────────────────────
    location / {
        root   /var/www/smart-library/static;
        index  index.html;
        try_files $uri $uri/ /index.html;   # SPA fallback
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    location /api/auth/login {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000/auth/login;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain application/json application/javascript text/css;
    gzip_min_length   1000;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/smart-library-access.log;
    error_log  /var/log/nginx/smart-library-error.log;
}

# HTTPS block (uncomment after: sudo certbot --nginx -d your-domain.com)
